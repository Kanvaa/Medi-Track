# ============================================================
# MediTrack — Application Configuration
# ============================================================

spring.application.name=MediTrack

# ------------------------------------------------------------
# MySQL Configuration (PRIMARY — requires MySQL installed)
# ------------------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/meditrack_db
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password_here
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------
# H2 In-Memory Database (FALLBACK — uncomment these lines and
# comment out the MySQL block above for a zero-setup demo)
# ------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:meditrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Encryption — override via environment variable in production:
#   export APP_ENCRYPTION_SECRET=your-strong-secret-here
# ------------------------------------------------------------
app.encryption.secret=${APP_ENCRYPTION_SECRET:MediTrack-Default-Secret-Change-In-Prod}

# ------------------------------------------------------------
# Session & Cookie Hardening
# ------------------------------------------------------------
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# ------------------------------------------------------------
# Error Handling
# ------------------------------------------------------------
server.error.include-stacktrace=never
