<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediTrack — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Brand -->
        <div class="login-brand">
            <span class="login-brand-icon">💊</span>
            <div class="login-brand-name">MediTrack</div>
            <div class="login-brand-sub">Pharmacy Inventory &amp; Sales Management</div>
        </div>

        <!-- Error / Logout Messages -->
        <div th:if="${param.error}" class="alert alert-error">
            <span th:if="${session.loginMessage}" th:text="${session.loginMessage}">Error</span>
            <span th:unless="${session.loginMessage}">Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out successfully.
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Enter your username" autocomplete="username" autofocus required/>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" autocomplete="current-password" required/>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

    </div>
</div>

</body>
</html>
