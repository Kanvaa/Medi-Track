<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediTrack — Medicine Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-wrapper">

    <div class="page-header">
        <h1>
            <span th:if="${medicine.id == null}">➕ Add Medicine</span>
            <span th:unless="${medicine.id == null}">✏️ Edit Medicine</span>
        </h1>
    </div>

    <div class="card" style="max-width: 720px;">

        <form th:action="@{/medicines/save}" th:object="${medicine}" method="post">

            <!-- Hidden ID for edits -->
            <input type="hidden" th:field="*{id}"/>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="name">Medicine Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control"
                           placeholder="e.g. Paracetamol 500mg" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="category">Category</label>
                    <input type="text" id="category" th:field="*{category}" class="form-control"
                           placeholder="e.g. Analgesic"/>
                    <div class="form-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}">Category error</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="manufacturer">Manufacturer</label>
                    <input type="text" id="manufacturer" th:field="*{manufacturer}" class="form-control"
                           placeholder="e.g. PharmaCo"/>
                    <div class="form-error" th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}">Manufacturer error</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="batchNumber">Batch Number</label>
                    <input type="text" id="batchNumber" th:field="*{batchNumber}" class="form-control"
                           placeholder="e.g. BATCH-2025-001"/>
                    <div class="form-error" th:if="${#fields.hasErrors('batchNumber')}" th:errors="*{batchNumber}">Batch error</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="expiryDate">Expiry Date</label>
                    <input type="date" id="expiryDate" th:field="*{expiryDate}" class="form-control" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('expiryDate')}" th:errors="*{expiryDate}">Expiry error</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="price">Price</label>
                    <input type="number" id="price" th:field="*{price}" class="form-control"
                           step="0.01" min="0" placeholder="0.00" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Price error</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="stockQuantity">Stock Quantity</label>
                    <input type="number" id="stockQuantity" th:field="*{stockQuantity}" class="form-control"
                           min="0" placeholder="0" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}">Stock error</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reorderThreshold">Reorder Threshold</label>
                    <input type="number" id="reorderThreshold" th:field="*{reorderThreshold}" class="form-control"
                           min="0" placeholder="10"/>
                    <div class="form-error" th:if="${#fields.hasErrors('reorderThreshold')}" th:errors="*{reorderThreshold}">Threshold error</div>
                </div>
            </div>

            <div class="form-group">
                <div class="form-check">
                    <input type="checkbox" id="prescriptionRequired" th:field="*{prescriptionRequired}"/>
                    <label class="form-label mb-0" for="prescriptionRequired" style="margin-bottom:0;">
                        Prescription Required
                    </label>
                </div>
            </div>

            <div class="separator"></div>

            <div class="flex flex-gap">
                <button type="submit" class="btn btn-primary">
                    <span th:if="${medicine.id == null}">Create Medicine</span>
                    <span th:unless="${medicine.id == null}">Update Medicine</span>
                </button>
                <a th:href="@{/medicines}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
