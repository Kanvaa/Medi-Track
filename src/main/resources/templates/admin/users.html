<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediTrack — User Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-wrapper">

    <div class="page-header">
        <h1>👥 User Management</h1>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- ── Create User Form ── -->
    <div class="card mb-4" style="max-width: 640px;">
        <div class="card-header">Create New User</div>
        <form th:action="@{/admin/users/create}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="e.g. pharmacist1" required/>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Minimum 8 characters" required/>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="role">Role</label>
                <select id="role" name="role" class="form-control" required>
                    <option value="">-- Select Role --</option>
                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r}">ROLE
                    </option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Create User</button>
        </form>
    </div>

    <!-- ── Users Table ── -->
    <h2 class="section-title">Existing Users</h2>

    <div class="table-responsive">
        <table>
            <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Enabled</th>
                <th>Failed Attempts</th>
                <th>Last Failed At</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td>
                    <strong th:text="${user.username}">admin</strong>
                </td>
                <td>
                    <span class="badge badge-role" th:text="${user.role}">OWNER</span>
                </td>
                <td>
                    <span th:if="${user.enabled}" class="badge badge-completed">Yes</span>
                    <span th:unless="${user.enabled}" class="badge badge-cancelled">No</span>
                </td>
                <td th:text="${user.failedLoginAttempts}">0</td>
                <td th:text="${user.lastFailedAttemptAt != null ? user.lastFailedAttemptAt : '—'}">—</td>
                <td>
                    <div class="btn-group">
                        <!-- Enable / Disable Toggle -->
                        <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" style="display:inline;">
                            <input type="hidden" name="enabled" th:value="${!user.enabled}"/>
                            <button type="submit" class="btn btn-xs"
                                    th:classappend="${user.enabled ? 'btn-warning' : 'btn-success'}"
                                    th:text="${user.enabled ? 'Disable' : 'Enable'}">Toggle</button>
                        </form>
                        <!-- Reset Backoff -->
                        <form th:if="${user.failedLoginAttempts > 0}"
                              th:action="@{/admin/users/{id}/reset-attempts(id=${user.id})}" method="post"
                              style="display:inline;">
                            <button type="submit" class="btn btn-xs btn-secondary">Reset Backoff</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${users == null or users.isEmpty()}">
                <td colspan="6" class="text-center text-muted p-3">No users found.</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
