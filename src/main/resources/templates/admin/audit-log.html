<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediTrack — Audit Log</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-wrapper">

    <div class="page-header">
        <h1>📜 Audit Log</h1>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
            <tr>
                <th>Timestamp</th>
                <th>Actor</th>
                <th>Action</th>
                <th>Details</th>
                <th>IP Address</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${logs}"
                th:classappend="${log.action.contains('FAILURE') or log.action.contains('BACKOFF_REJECTED') or log.action.contains('BLOCKED')} ? 'row-danger' : ''">
                <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}">2025-01-01 12:00:00</td>
                <td>
                    <strong th:text="${log.actor}">admin</strong>
                </td>
                <td>
                    <code class="text-sm" th:text="${log.action}">LOGIN_SUCCESS</code>
                </td>
                <td class="text-sm" th:text="${log.details}">—</td>
                <td>
                    <code class="text-sm" th:text="${log.ipAddress}">127.0.0.1</code>
                </td>
            </tr>
            <tr th:if="${logs == null or logs.isEmpty()}">
                <td colspan="5" class="text-center text-muted p-3">No audit log entries.</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
