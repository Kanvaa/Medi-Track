<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MediTrack — Change Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=1.0.1)}"/>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-wrapper">

    <div class="page-header">
        <h1>🔒 Change Password</h1>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="card" style="max-width: 480px;">
        <div class="card-header">Update Your Password</div>
        <form th:action="@{/change-password}" method="post" style="padding: 1.5rem;">

            <div class="form-group">
                <label for="currentPassword" class="form-label">Current Password</label>
                <div style="position:relative;">
                    <input type="password" id="currentPassword" name="currentPassword" class="form-control"
                           placeholder="Enter current password" required style="padding-right:44px;"/>
                    <span class="toggle-pw"
                          style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                 cursor:pointer; font-size:1.2rem; user-select:none; opacity:0.6;
                                 transition:opacity 0.2s;"
                          onmouseover="this.style.opacity='1'"
                          onmouseout="this.style.opacity='0.6'"
                          onclick="togglePw(this, 'currentPassword')">👁</span>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword" class="form-label">New Password</label>
                <div style="position:relative;">
                    <input type="password" id="newPassword" name="newPassword" class="form-control"
                           placeholder="At least 8 characters" required minlength="8" style="padding-right:44px;"/>
                    <span class="toggle-pw"
                          style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                 cursor:pointer; font-size:1.2rem; user-select:none; opacity:0.6;
                                 transition:opacity 0.2s;"
                          onmouseover="this.style.opacity='1'"
                          onmouseout="this.style.opacity='0.6'"
                          onclick="togglePw(this, 'newPassword')">👁</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <div style="position:relative;">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                           placeholder="Re-enter new password" required minlength="8" style="padding-right:44px;"/>
                    <span class="toggle-pw"
                          style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                                 cursor:pointer; font-size:1.2rem; user-select:none; opacity:0.6;
                                 transition:opacity 0.2s;"
                          onmouseover="this.style.opacity='1'"
                          onmouseout="this.style.opacity='0.6'"
                          onclick="togglePw(this, 'confirmPassword')">👁</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Change Password</button>
            <a th:href="@{/dashboard}" class="btn btn-secondary" style="margin-left:0.5rem;">Cancel</a>
        </form>
    </div>

</div>

<script>
function togglePw(icon, inputId) {
    var p = document.getElementById(inputId);
    if (p.type === 'password') { p.type = 'text'; icon.textContent = '🙈'; }
    else { p.type = 'password'; icon.textContent = '👁'; }
}
</script>

</body>
</html>
