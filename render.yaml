services:
  - type: web
    name: medi-track
    env: docker
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_ENCRYPTION_SECRET
        generateValue: true
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: meditrack-db
          property: connectionString

databases:
  - name: meditrack-db
    plan: free
